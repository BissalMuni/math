name: Review Feedback
on:
  schedule:
    - cron: '17 */6 * * *' # 6시간마다 :17분 (UTC) — 하루 4회
  workflow_dispatch: {} # 수동 실행 가능

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1) 레포 체크아웃
      - uses: actions/checkout@v4

      # 2) Node.js 설치 (fetch-feedback.sh에서 node 사용)
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3) 미처리 의견 확인 — 없으면 조기 종료
      - name: Check unprocessed comments
        id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          COMMENTS=$(bash scripts/fetch-feedback.sh)
          if [ "$COMMENTS" = "[]" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            COUNT=$(echo "$COMMENTS" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).length))")
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
          fi

      # 4) Claude Code 설치
      - name: Install Claude Code
        if: steps.check.outputs.skip == 'false'
        run: npm install -g @anthropic-ai/claude-code

      # 5) Claude Code로 피드백 반영
      - name: Apply feedback
        if: steps.check.outputs.skip == 'false'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          claude --print --dangerously-skip-permissions \
            --allowedTools "Bash,Read,Edit,Write,Glob,Grep" \
            -p "$(cat src/content/RULES.md)

          이 레포에서 review-feedback 작업을 수행해줘.
          절대 규칙:
          - src/content/ 과 scripts/ 내의 파일만 수정 가능
          - 다른 경로의 파일은 읽기만 가능
          - bash scripts/fetch-feedback.sh 로 미처리 의견 조회
          - 내용이 합리적이면 src/content/ 콘텐츠에 반영
          - 비합리적이거나 단순 감상은 processed만 표시
          - 변경 후 bash scripts/fetch-feedback.sh --mark-all-unprocessed 실행
          - git commit/push는 하지 말 것 (아래 step에서 처리)"

      # 6) 변경사항 커밋 & 푸시
      - name: Commit and push
        id: commit
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A src/content/
          if git diff --cached --quiet; then
            echo "No content changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "$(cat <<'EOF'
          Apply user feedback (${{ steps.check.outputs.count }} comments)

          Co-Authored-By: Claude Opus 4.6 (1M context) <noreply@anthropic.com>
          EOF
          )"
            git push
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      # 7) 수정 이력을 Supabase에 기록
      - name: Log content changes
        if: steps.check.outputs.skip == 'false' && steps.commit.outputs.has_changes == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: bash scripts/log-content-changes.sh
