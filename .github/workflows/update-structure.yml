name: Update Structure
on:
  schedule:
    - cron: '47 3 * * *' # 매일 03:47 UTC (한국시간 12:47) — content와 30분 간격
  workflow_dispatch: {} # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1) 레포 체크아웃
      - uses: actions/checkout@v4

      # 2) Node.js 설치
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3) 미처리 구조 수정 의견 확인 — 없으면 조기 종료
      - name: Check unprocessed structure comments
        id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          COMMENTS=$(bash scripts/fetch-feedback.sh --type=structure)
          if [ "$COMMENTS" = "[]" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            COUNT=$(echo "$COMMENTS" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).length))")
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
          fi

      # 4) Claude Code 설치
      - name: Install Claude Code
        if: steps.check.outputs.skip == 'false'
        run: npm install -g @anthropic-ai/claude-code

      # 5) Claude Code로 구조 피드백 반영
      - name: Apply structure feedback
        if: steps.check.outputs.skip == 'false'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          claude --print --dangerously-skip-permissions \
            --allowedTools "Bash,Read,Edit,Write,Glob,Grep" \
            -p "$(cat src/content/RULES.md)

          이 레포에서 구조(목차) 피드백 반영 작업을 수행해줘.

          == 구조 파일 설명 ==
          - src/structure/*.ts — 트리 노드 정의 (id, slug, title, children)
          - src/map/index.ts — topicId → 콘텐츠 컴포넌트 매핑 (lazy import)
          - src/content/**/*.tsx — 실제 콘텐츠 파일

          == 절대 규칙 ==
          - bash scripts/fetch-feedback.sh --type=structure 로 미처리 구조 의견 조회
          - 수정 가능 파일: src/structure/*.ts, src/map/index.ts, src/content/**/*.tsx
          - 그 외 파일은 읽기만 가능
          - 구조 변경 시 반드시 3곳을 동기화:
            1. src/structure/ — 트리 노드 추가/삭제/이동
            2. src/map/index.ts — 새 topicId 매핑 등록 (삭제 시 제거)
            3. src/content/ — 새 leaf node는 빈 템플릿 TSX 파일 생성
          - 기존 콘텐츠 파일이 있는 노드를 삭제하면 해당 파일도 삭제
          - id 네이밍 규칙: 기존 패턴을 따를 것 (예: m1-t1, llm-f-la-t1)
          - slug는 영문 케밥케이스, URL에 사용됨
          - 비합리적이거나 모호한 요청은 processed만 표시
          - 변경 후 bash scripts/fetch-feedback.sh --type=structure --mark-all-unprocessed 실행
          - git commit/push는 하지 말 것 (아래 step에서 처리)"

      # 6) 변경사항 커밋 & main에 푸시
      - name: Commit and push
        id: commit
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A src/structure/ src/map/ src/content/
          if git diff --cached --quiet; then
            echo "No structure changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "$(cat <<'EOF'
          Apply structure feedback (${{ steps.check.outputs.count }} comments)

          Co-Authored-By: Claude Opus 4.6 (1M context) <noreply@anthropic.com>
          EOF
          )"
            git push
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      # 7) 수정 이력을 Supabase에 기록
      - name: Log structure changes
        if: steps.check.outputs.skip == 'false' && steps.commit.outputs.has_changes == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: bash scripts/log-content-changes.sh
